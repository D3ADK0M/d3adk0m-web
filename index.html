<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D3ADK0M | Terminal</title>
    <style>
        :root {
            --matrix-green: #00ff41;
            --dark-bg: #0d0d0d;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--matrix-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            border: 1px solid var(--matrix-green);
            padding: 40px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            max-width: 600px;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .status {
            margin-bottom: 30px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .status::before {
            content: "> ";
        }

        .links {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            color: var(--dark-bg);
            background-color: var(--matrix-green);
            text-decoration: none;
            padding: 10px 20px;
            font-weight: bold;
            border: 1px solid var(--matrix-green);
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: var(--dark-bg);
            color: var(--matrix-green);
            box-shadow: 0 0 15px var(--matrix-green);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.7rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>D3ADK0M</h1>
        <p class="status">Sistemas Matrix/Element: ONLINE</p>
        
        <div class="links">
            <a href="https://element.d3adk0m.com" class="btn">ACCEDER A ELEMENT</a>
            
            <a href="https://matrix.d3adk0m.com/synapse-admin/#/login" class="btn">ADMIN PANEL</a>
        </div>

        <p style="margin-top: 30px; font-size: 0.8rem;">
            Dominio principal gestionado vía GitHub Pages.<br>
            Servicios federados alojados en Hetzner Cloud.
        </p>
    </div>

    <div class="footer">
        © 2026 D3ADK0M - Establishing connection...
    </div>

</body>
</html>
